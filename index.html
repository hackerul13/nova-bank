<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nova Bank - Create Account</title>

<link rel="stylesheet" href="index.css">
</head>
<body>

<div class="container">

    <div class="logo">
        <h1>🏦 Nova Bank</h1>
        <p>Secure Digital Banking</p>
    </div>

    <form id="accountForm">

        <label>Full Name</label>
        <input type="text" id="name" placeholder="John Doe" required>

        <label>Email Address</label>
        <input type="email" id="email" placeholder="example@gmail.com" required>

        <label>Phone Number</label>
        <input type="tel" id="phone" placeholder="+250..." required>

        <label>Date of Birth</label>
        <input type="date" required>

        <label>National ID / Passport</label>
        <input type="text" required>

        <label>Occupation</label>
        <input type="text" placeholder="Software Developer">

        <label>Monthly Income</label>
        <input type="number" placeholder="1000">

        <label>Account Type</label>
        <select required>
            <option value="">Select Account Type</option>
            <option>Savings Account</option>
            <option>Current Account</option>
            <option>Business Account</option>
        </select>

        <label>Create Password</label>

        <div class="password-box">
            <input type="password" id="password" required>
            <span id="togglePassword">👁</span>
        </div>

        <small id="strength"></small>

        <label>Confirm Password</label>
        <input type="password" id="confirmPassword" required>

        <label class="terms">
            <input type="checkbox" required>
            I agree to the Terms & Conditions
        </label>

        <button type="submit">Open Account</button>

    </form>

    <div id="successMessage"></div>

    <div class="footer">
        Secure • Fast • Trusted Banking
    </div>

</div>

<script src="script.js"></script>

</body>
</html>
